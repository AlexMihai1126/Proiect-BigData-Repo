services:
  postgres-db:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: test1234
      POSTGRES_DB: ids_testdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      pcap-lab-net:
        ipv4_address: 172.28.0.2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_user -d ids_testdb"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  api-service:
    build:
      context: ./api-service
    image: pcap-lab/api-service:latest
    container_name: api-service
    environment:
      PORT: 8080
      DATABASE_URL: postgres://db_user:test1234@postgres-db:5432/ids_testdb
      DB_POOL_SIZE: 10
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      pcap-lab-net:
        ipv4_address: 172.28.0.10
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8080/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  client-traffic-generator:
    image: curlimages/curl:latest
    container_name: client-traffic-generator
    depends_on:
      api-service:
        condition: service_healthy
    volumes:
      - ./client-traffic-generator:/traffic:ro
    entrypoint: ["/bin/sh", "/traffic/generate_traffic.sh"]
    networks:
      pcap-lab-net:
        ipv4_address: 172.28.0.20
  
networks:
  pcap-lab-net:
    name: pcap-lab-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  postgres_data: